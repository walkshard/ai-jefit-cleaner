name: Python Jefit Parser

on:
  push:
    paths:
      - "input/**"

jobs:
  convert-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Pandas
        run: pip install pandas

      - name: Run Parser
        run: python clean_jefit.py

      - name: Save Clean Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/Cleaned_Jefit_Data.csv
          git add output/Dashboard_Data.csv
          git commit -m "Parsed vertical CSV" || echo "No changes to commit"
          git push

