name: AI Background Processor

on:
  push:
    paths:
      - "input/**"

jobs:
  process-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas google-generativeai

      - name: Run AI Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python clean_jefit.py

      - name: Save Cleaned CSV
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/Cleaned_Jefit_Data.csv
          git commit -m "AI processed Jefit data" || echo "No changes"
          git push
          
